<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>강의 슬라이드 의뢰 — Edu-match</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: {
        brand:{50:"#eef2ff",100:"#e0e7ff",500:"#6366f1",600:"#4f46e5",700:"#4338ca"}
      } } } };
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <style>body{font-family:Pretendard,system-ui,sans-serif}</style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-client.js" defer></script>
  </head>
  <body class="bg-white text-slate-900">

    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur border-b border-slate-100">
      <div class="max-w-6xl mx-auto flex items-center justify-between px-5 h-16">
        <a href="./index.html" class="flex items-baseline gap-2"><span class="text-xl font-extrabold text-brand-600">Edu-match</span><span class="text-xs text-slate-400">slides</span></a>
        <nav class="hidden md:flex items-center gap-5 text-sm text-slate-600">
          <a href="./index.html#jobs" class="hover:text-slate-900">공고</a>
          <a href="./register-lecture.html" class="hover:text-slate-900">강의 등록</a>
          <a href="./pbl-request.html" class="hover:text-slate-900">PBL 의뢰</a>
          <a href="./materials.html" class="hover:text-slate-900">자료실</a>
        </nav>
      </div>
    </header>

    <main class="max-w-3xl mx-auto px-5 py-12">
      <div class="text-center">
        <span class="text-xs font-bold tracking-widest text-brand-600 uppercase">Slide Draft Service</span>
        <h1 class="mt-2 text-3xl font-extrabold">강의 슬라이드 초안 제작 의뢰</h1>
        <p class="mt-3 text-slate-600">임직원 교육 · 임원 브리핑 · 현장 연수용 슬라이드 초안을 1~2주 내 제공합니다.</p>
      </div>

      <form id="slide-form" class="mt-10 space-y-6" novalidate>
        <section class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
          <h2 class="font-bold flex items-center gap-2"><span class="w-6 h-6 rounded-lg bg-brand-100 text-brand-700 flex items-center justify-center text-xs font-extrabold">①</span>의뢰자 정보</h2>
          <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-3">
            <div><label class="block text-sm font-medium text-slate-700">담당자 성함 *</label><input id="sr-name" required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"/></div>
            <div><label class="block text-sm font-medium text-slate-700">이메일 *</label><input id="sr-email" type="email" required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"/></div>
            <div><label class="block text-sm font-medium text-slate-700">연락처</label><input id="sr-phone" type="tel" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"/></div>
            <div><label class="block text-sm font-medium text-slate-700">기관/기업명</label><input id="sr-org" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"/></div>
          </div>
        </section>

        <section class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
          <h2 class="font-bold flex items-center gap-2"><span class="w-6 h-6 rounded-lg bg-brand-100 text-brand-700 flex items-center justify-center text-xs font-extrabold">②</span>강의 슬라이드 개요</h2>
          <div class="mt-4 space-y-3">
            <div><label class="block text-sm font-medium text-slate-700">강의 주제 *</label><input id="ss-topic" required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"/></div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
              <div><label class="block text-sm font-medium text-slate-700">분야</label><input id="ss-domain" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"/></div>
              <div><label class="block text-sm font-medium text-slate-700">대상 수준</label>
                <select id="ss-level" class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300">
                  <option>입문</option><option selected>중급</option><option>고급</option>
                </select></div>
              <div><label class="block text-sm font-medium text-slate-700">수강 인원</label><input id="ss-size" type="number" min="0" value="50" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"/></div>
              <div><label class="block text-sm font-medium text-slate-700">총 강의 시간 (h)</label><input id="ss-hours" type="number" min="0" value="8" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"/></div>
              <div><label class="block text-sm font-medium text-slate-700">예상 슬라이드 수</label><input id="ss-slides" type="number" min="0" value="40" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"/></div>
              <div><label class="block text-sm font-medium text-slate-700">산출물</label>
                <select id="ss-format" class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300">
                  <option value="pptx" selected>PPTX</option><option value="pdf">PDF</option><option value="keynote">Keynote</option><option value="google-slides">Google Slides</option>
                </select></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div><label class="block text-sm font-medium text-slate-700">스타일 선호</label><input id="ss-style" placeholder="실무형 · 키노트형 · 임원 브리핑 등" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"/></div>
              <div><label class="block text-sm font-medium text-slate-700">컬러/브랜드 테마</label><input id="ss-color" placeholder="다크 블루 + 네온 바이올렛 등" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"/></div>
            </div>
            <div><label class="block text-sm font-medium text-slate-700">강의 목표 · 핵심 메시지 *</label><textarea id="ss-obj" rows="4" required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"></textarea></div>
            <div><label class="block text-sm font-medium text-slate-700">기타 요청사항</label><input id="ss-notes" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"/></div>
          </div>
        </section>

        <section class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
          <h2 class="font-bold flex items-center gap-2"><span class="w-6 h-6 rounded-lg bg-brand-100 text-brand-700 flex items-center justify-center text-xs font-extrabold">③</span>참고 자료 취합</h2>
          <p class="mt-2 text-xs text-slate-500">브랜드 가이드·기존 사내 템플릿·레퍼런스 슬라이드 공유 링크를 첨부해주세요.</p>
          <div id="slide-materials-list" class="mt-3 space-y-2"></div>
          <button type="button" id="slide-add-material" class="mt-2 w-full py-2.5 text-sm text-slate-600 border border-dashed border-slate-300 rounded-lg hover:border-brand-300 hover:text-brand-600">+ 참고자료 추가</button>
        </section>

        <button type="submit" class="w-full py-4 bg-brand-600 text-white font-bold rounded-lg hover:bg-brand-700 shadow-sm">슬라이드 의뢰 제출</button>
        <div id="slide-msg" class="text-sm font-medium text-center"></div>
      </form>
    </main>

    <footer class="max-w-6xl mx-auto px-5 py-10 text-center text-sm text-slate-500">© <span id="year">2026</span> Edu-match Platform</footer>
    <script>document.getElementById("year").textContent = String(new Date().getFullYear());</script>
    <script src="./slide-request.js" defer></script>
  </body>
</html>
