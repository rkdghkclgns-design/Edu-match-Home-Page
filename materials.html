<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>강사 자료실 — Edu-match</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: {
        brand:{50:"#eef2ff",100:"#e0e7ff",500:"#6366f1",600:"#4f46e5",700:"#4338ca"}
      } } } };
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <style>body{font-family:Pretendard,system-ui,sans-serif}</style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-client.js" defer></script>
  </head>
  <body class="bg-white text-slate-900">

    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur border-b border-slate-100">
      <div class="max-w-6xl mx-auto flex items-center justify-between px-5 h-16">
        <a href="./index.html" class="flex items-baseline gap-2"><span class="text-xl font-extrabold text-brand-600">Edu-match</span><span class="text-xs text-slate-400">materials</span></a>
        <nav class="hidden md:flex items-center gap-5 text-sm text-slate-600">
          <a href="./index.html#jobs" class="hover:text-slate-900">공고</a>
          <a href="./index.html#instructors" class="hover:text-slate-900">강사진</a>
          <a href="./pbl-request.html" class="hover:text-slate-900">PBL 의뢰</a>
          <a href="./slide-request.html" class="hover:text-slate-900">슬라이드 의뢰</a>
        </nav>
        <div class="flex items-center gap-2">
          <span id="user-email" class="text-sm text-slate-500">비로그인</span>
          <a href="./login.html" id="login-link" class="px-3 py-1.5 text-sm font-semibold bg-brand-600 text-white rounded-lg hover:bg-brand-700">로그인</a>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-5 py-12">
      <div class="text-center">
        <span class="text-xs font-bold tracking-widest text-brand-600 uppercase">Instructor Resources</span>
        <h1 class="mt-2 text-3xl font-extrabold">승인 강사 전용 자료실</h1>
        <p class="mt-3 text-slate-600">강사 회원가입 후 관리자 승인이 완료된 강사만 열람 가능합니다. 업로드 자료는 관리자 승인을 거쳐 공개됩니다.</p>
      </div>

      <!-- Gate -->
      <div id="gate" class="hidden max-w-xl mx-auto mt-10 bg-white rounded-2xl border border-slate-200 shadow-sm p-8 text-center">
        <h2 id="gate-title" class="text-xl font-bold">강사 인증이 필요합니다</h2>
        <p id="gate-msg" class="mt-2 text-sm text-slate-600">로그인 후 승인된 강사 회원만 자료실에 접근할 수 있습니다.</p>
        <div class="mt-6 flex gap-2 justify-center">
          <a href="./login.html" class="px-5 py-2.5 bg-brand-600 text-white font-semibold rounded-lg hover:bg-brand-700">로그인</a>
          <a href="./signup.html" class="px-5 py-2.5 bg-slate-100 text-slate-700 font-semibold rounded-lg hover:bg-slate-200">강사 회원가입</a>
        </div>
      </div>

      <!-- Content -->
      <div id="materials-root" class="hidden">
        <div class="mt-8 flex flex-wrap items-center gap-2">
          <button id="show-upload" class="px-4 py-2 text-sm font-semibold text-white bg-brand-600 rounded-lg hover:bg-brand-700">자료 업로드</button>
          <button id="logout-btn" class="px-4 py-2 text-sm font-semibold text-slate-700 bg-slate-100 rounded-lg hover:bg-slate-200">로그아웃</button>
          <span id="materials-count" class="ml-auto text-sm text-slate-500">—</span>
        </div>

        <form id="upload-form" class="hidden mt-4 bg-white rounded-2xl border border-slate-200 shadow-sm p-6 space-y-3">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div><label class="block text-sm font-medium text-slate-700">자료 제목 *</label><input id="m-title" required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"/></div>
            <div><label class="block text-sm font-medium text-slate-700">카테고리</label>
              <select id="m-category" class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300">
                <option value="corporate-lecture">기업출강 워크샵</option>
                <option value="teambuilding">팀빌딩 프로그램</option>
                <option value="craft-experience">공방체험</option>
                <option value="diy-kit">DIY키트</option>
                <option value="it-ai" selected>IT · AI 교육</option>
                <option value="leadership">리더십 · 조직개발</option>
                <option value="design">디자인 · UX</option>
                <option value="data">데이터 분석</option>
              </select></div>
          </div>
          <div><label class="block text-sm font-medium text-slate-700">설명 *</label><textarea id="m-desc" rows="3" required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"></textarea></div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div><label class="block text-sm font-medium text-slate-700">자료 URL *</label><input id="m-url" type="url" required placeholder="https://drive.google.com/…" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"/></div>
            <div><label class="block text-sm font-medium text-slate-700">태그</label><input id="m-tags" placeholder="쉼표 구분" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-300"/></div>
          </div>
          <button type="submit" class="w-full py-3 bg-brand-600 text-white font-semibold rounded-lg hover:bg-brand-700">업로드 (관리자 승인 대기)</button>
          <div id="upload-msg" class="text-sm text-center font-medium"></div>
        </form>

        <div id="materials-grid" class="mt-6 grid gap-4 md:grid-cols-2 lg:grid-cols-3"></div>
      </div>
    </main>

    <footer class="max-w-6xl mx-auto px-5 py-10 text-center text-sm text-slate-500">© <span id="year">2026</span> Edu-match Platform · Instructors Only</footer>
    <script>document.getElementById("year").textContent = String(new Date().getFullYear());</script>
    <script src="./materials.js" defer></script>
  </body>
</html>
