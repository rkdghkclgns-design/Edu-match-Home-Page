<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#07070d" />
    <title>로그인 — Edu-match</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js" defer></script>
    <script src="./auth.js" defer></script>
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--violet" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--cyan" aria-hidden="true"></div>

    <header class="nav">
      <a href="./index.html" class="nav__logo" aria-label="홈">
        <span class="nav__logo-mark">Edu-match</span>
        <span class="nav__logo-sub">platform</span>
      </a>
      <nav class="nav__links" aria-label="주요 섹션">
        <a href="./index.html#categories">서비스 분야</a>
        <a href="./index.html#instructors">강사진</a>
        <a href="./index.html#jobs">강의 공고</a>
      </nav>
      <div class="nav__auth">
        <a href="./signup.html" class="nav__auth-link">회원가입</a>
        <a href="./index.html" class="nav__cta">홈으로</a>
      </div>
    </header>

    <main class="auth-wrap">
      <div class="auth-card">
        <span class="auth-card__tag">Sign In</span>
        <h1 class="auth-card__title">Edu-match 로그인</h1>
        <p class="auth-card__sub">일반 회원 · 강사 · 관리자 통합 로그인 창입니다.</p>

        <div class="auth-tabs" role="tablist">
          <button type="button" class="auth-tab is-active" data-tab="user">일반 로그인</button>
          <button type="button" class="auth-tab" data-tab="admin">관리자 로그인</button>
        </div>

        <!-- 일반 로그인 -->
        <form id="login-form" class="auth-form" data-panel="user" novalidate>
          <div class="form-field">
            <label for="login-email">이메일</label>
            <input id="login-email" name="email" type="email" required placeholder="you@company.com" />
          </div>

          <div class="form-field">
            <label for="login-password">비밀번호</label>
            <input id="login-password" name="password" type="password" required />
          </div>

          <button type="submit" class="auth-submit">로그인</button>

          <div id="login-message" class="auth-message"></div>
        </form>

        <!-- 관리자 로그인 -->
        <form id="admin-login-form" class="auth-form" data-panel="admin" style="display:none" novalidate>
          <div class="form-field">
            <label for="admin-id">관리자 ID</label>
            <input id="admin-id" name="id" type="text" required autocomplete="username" />
          </div>

          <div class="form-field">
            <label for="admin-pw">관리자 비밀번호</label>
            <input id="admin-pw" name="pw" type="password" required autocomplete="current-password" />
          </div>

          <button type="submit" class="auth-submit">관리자 페이지 진입</button>

          <div id="admin-login-message" class="auth-message"></div>
        </form>

        <div class="auth-divider">─ OR ─</div>
        <p class="auth-alt">계정이 없으신가요?<a href="./signup.html">회원가입</a></p>
      </div>
    </main>

    <footer class="footer">
      <div class="footer__inner">
        <span>© <span id="year">2026</span> Edu-match Platform. All rights reserved.</span>
        <span class="footer__tag">Connecting Experts · Empowering Education</span>
      </div>
    </footer>

    <script>
      document.getElementById("year").textContent = String(new Date().getFullYear());
    </script>
  </body>
</html>
